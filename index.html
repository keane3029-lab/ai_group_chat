<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Core: Secure Chatroom</title>
    <style>
        body { font-family: sans-serif; background: #0f0f11; color: #e4e4e7; padding: 20px; }
        #chat-box { height: 400px; overflow-y: auto; border: 1px solid #333; padding: 10px; margin-bottom: 10px; }
        .message { margin-bottom: 10px; padding: 8px; border-radius: 5px; background: #1e293b; }
        .controls { display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; }
    </style>
</head>
<body>
    <h1>AI Core Chatroom</h1>
    <button onclick="promptForKey()">🔑 Update API Key</button>
    <div id="chat-box"></div>
    <div class="controls">
        <input type="text" id="user-input" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        // Key is stored only in the browser's local memory
        function promptForKey() {
            const key = prompt("Enter your Gemini API Key:");
            if (key) localStorage.setItem('GEMINI_KEY', key.trim());
        }

        async function sendMessage() {
            const key = localStorage.getItem('GEMINI_KEY');
            if (!key) return promptForKey();

            const input = document.getElementById('user-input');
            const msg = input.value;
            document.getElementById('chat-box').innerHTML += `<div class="message">You: ${msg}</div>`;
            input.value = '';

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: msg }] }] })
            });
            const data = await response.json();
            const reply = data.candidates[0].content.parts[0].text;
            document.getElementById('chat-box').innerHTML += `<div class="message">Gemini: ${reply}</div>`;
        }
    </script>
</body>
</html>
