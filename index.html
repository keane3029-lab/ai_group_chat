<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Core: Advanced Media Chatroom</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f0f11; color: #e4e4e7; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        header { background: #18181b; padding: 15px 20px; border-bottom: 1px solid #27272a; display: flex; justify-content: space-between; align-items: center; }
        header h1 { margin: 0; font-size: 1.25rem; color: #f4f4f5; }
        #key-status { font-size: 0.85rem; color: #10b981; cursor: pointer; text-decoration: underline; background: #1e293b; padding: 6px 12px; border-radius: 6px; }
        #key-status:hover { background: #334155; }
        
        #chat-box { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
        .message { padding: 14px 18px; border-radius: 12px; max-width: 75%; line-height: 1.6; font-size: 0.95rem; word-wrap: break-word; }
        .meta-name { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; display: block; }
        
        .User { background: #27272a; align-self: flex-end; border-bottom-right-radius: 2px; }
        .User .meta-name { color: #a1a1aa; }
        .Gemini { background: #1e293b; align-self: flex-start; border-bottom-left-radius: 2px; border-left: 4px solid #3b82f6; }
        .Gemini .meta-name { color: #60a5fa; }
        .Llama { background: #252a34; align-self: flex-start; border-bottom-left-radius: 2px; border-left: 4px solid #10b981; }
        .Llama .meta-name { color: #34d399; }
        
        .chat-img, .chat-video { max-width: 100%; max-height: 250px; border-radius: 8px; margin-top: 8px; display: block; }
        .chat-link { color: #60a5fa; text-decoration: underline; word-break: break-all; }
        .chat-file-link { display: inline-flex; align-items: center; gap: 8px; background: #18181b; padding: 8px 12px; border-radius: 6px; color: #e4e4e7; text-decoration: none; margin-top: 6px; border: 1px solid #27272a; }

        #camera-panel { display: none; background: #18181b; border-top: 1px solid #27272a; padding: 15px; text-align: center; position: relative; }
        #webcam-view { width: 100%; max-width: 400px; border-radius: 8px; background: #000; }
        .flipped { transform: scaleX(-1); }
        
        #input-area { padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #18181b; border-top: 1px solid #27272a; }
        .controls-row { display: flex; gap: 12px; width: 100%; }
        .action-btn { background: #27272a; color: white; border: 1px solid #3f3f46; padding: 10px 14px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; gap: 6px; }
        .action-btn:hover { background: #3f3f46; }
        
        input[type="text"] { flex: 1; padding: 14px; border-radius: 8px; border: 1px solid #27272a; background: #09090b; color: #fff; font-size: 1rem; outline: none; }
        #send-btn { padding: 0 24px; border: none; background: #2563eb; color: white; font-weight: 600; cursor: pointer; border-radius: 8px; }
        #send-btn:hover { background: #1d4ed8; }
        
        #file-input { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>AI Core: Media Sandbox</h1>
        <div id="key-status" onclick="setupKeys()">🔑 Manage API Keys</div>
    </header>

    <div id="chat-box"></div>
    
    <div id="camera-panel">
        <video id="webcam-view" autoplay playsinline></video>
        <div style="margin-top: 10px; display: flex; justify-content: center; gap: 10px;">
            <button class="action-btn" onclick="captureSnapshot()">📸 Snap Photo</button>
            <button class="action-btn" onclick="flipCamera()">🔄 Flip Camera</button>
            <button class="action-btn" style="background:#dc2626;" onclick="closeCamera()">❌ Close</button>
        </div>
    </div>

    <div id="input-area">
        <div class="controls-row">
            <button class="action-btn" onclick="openCamera()">📷 Use Camera</button>
            <button class="action-btn" onclick="document.getElementById('file-input').click()">📁 Insert File</button>
            <input type="file" id="file-input" onchange="handleFileInsert(this)">
        </div>
        
        <div class="controls-row">
            <input type="text" id="user-input" placeholder="Type a message or paste a link..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const cameraPanel = document.getElementById('camera-panel');
        const videoElement = document.getElementById('webcam-view');
        
        let clientHistory = [];
        let streamTrack = null;
        let currentFacingMode = "user";

        const systemPrompts = {
            Gemini: "You are Gemini, a highly intelligent, completely normal, and clear AI assistant. Speak in clear, plain, everyday English. However, you occasionally drop a tiny, subtle bit of internet brainrot slang (like cooked, locking in, or aura) into your sentences just for casual humor. Never go unhinged or make your text confusing. Keep your answers brief and helpful.",
            Llama: "You are a polite, helpful, and completely normal AI assistant. Speak professionally, clearly, and support the user with any questions they have without using any internet slang."
        };

        // --- INSTANT ACCESS FOR GUESTS ---
        // Put your real Gemini key inside the quotes below!
      // This placeholder will be automatically replaced by GitHub Actions
        const EMBEDDED_KEY = "AIzaSyDoHbk5jAwVwXLDz50JLA3dUr70C4SWdxg";
        function setupKeys() {
            if (!localStorage.getItem('GEMINI_KEY') || localStorage.getItem('GEMINI_KEY') === '') {
                localStorage.setItem('GEMINI_KEY', EMBEDDED_KEY);
            }
        }
        setupKeys();

        function formatLinksAndText(text) {
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return text.replace(urlRegex, (url) => {
                return `<a href="${url}" target="_blank" class="chat-link">${url}</a>`;
            });
        }

        function appendMessage(sender, htmlContent) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerHTML = `<span class="meta-name">${sender}</span>${htmlContent}`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        /* --- WEBCAM DRIVERS --- */
        async function openCamera() {
            cameraPanel.style.display = "block";
            if (streamTrack) {
                streamTrack.getTracks().forEach(track => track.stop());
            }
            try {
                const constraints = { video: { facingMode: currentFacingMode } };
                streamTrack = await navigator.mediaDevices.getUserMedia(constraints);
                videoElement.srcObject = streamTrack;
                
                if (currentFacingMode === "user") {
                    videoElement.classList.add('flipped');
                } else {
                    videoElement.classList.remove('flipped');
                }
            } catch (err) {
                alert("Camera access unavailable: " + err.message);
                cameraPanel.style.display = "none";
            }
        }

        function flipCamera() {
            currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
            openCamera();
        }

        function closeCamera() {
            if (streamTrack) {
                streamTrack.getTracks().forEach(track => track.stop());
            }
            cameraPanel.style.display = "none";
        }

        function captureSnapshot() {
            const canvas = document.createElement('canvas');
            canvas.width = videoElement.videoWidth;
            canvas.height = videoElement.videoHeight;
            const ctx = canvas.getContext('2d');
            
            if (currentFacingMode === "user") {
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
            }
            
            ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
            const dataUrl = canvas.toDataURL('image/png');
            
            appendMessage('User', `Captured a live photo:<br><img src="${dataUrl}" class="chat-img">`);
            clientHistory.push({ sender: 'User', text: "[User shared a captured camera image file]" });
            
            closeCamera();
            triggerAiPipeline("[User uploaded a camera snapshot image]");
        }

        /* --- LOCAL FILE MOUNT --- */
        function handleFileInsert(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            
            if (file.type.startsWith('image/')) {
                reader.onload = function(e) {
                    appendMessage('User', `Uploaded photo (${file.name}):<br><img src="${e.target.result}" class="chat-img">`);
                    triggerAiPipeline(`[User uploaded a photo image file named: ${file.name}]`);
                }
                reader.readAsDataURL(file);
            } else if (file.type.startsWith('video/')) {
                reader.onload = function(e) {
                    appendMessage('User', `Uploaded video (${file.name}):<br><video src="${e.target.result}" controls class="chat-video"></video>`);
                    triggerAiPipeline(`[User uploaded a short video file named: ${file.name}]`);
                }
                reader.readAsDataURL(file);
            } else {
                reader.onload = function(e) {
                    appendMessage('User', `Shared a file:<br><a href="${e.target.result}" download="${file.name}" class="chat-file-link">📄 ${file.name}</a>`);
                    triggerAiPipeline(`[User shared a file named: ${file.name}]`);
                }
                reader.readAsDataURL(file);
            }
            clientHistory.push({ sender: 'User', text: `[User attached file: ${file.name}]` });
            input.value = '';
        }

        /* --- DUAL GOOGLE PIPELINE --- */
        async function fetchGemini(transcript) {
            const key = localStorage.getItem('GEMINI_KEY');
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `${systemPrompts.Gemini}\n\nTimeline:\n${transcript}\n\nFormulate your immediate chat reply naturally.` }] }]
                })
            });
            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }

        async function fetchLlama(transcript) {
            const key = localStorage.getItem('GEMINI_KEY');
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${key}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `${systemPrompts.Llama}\n\nTimeline:\n${transcript}\n\nFormulate your immediate chat reply naturally.` }] }]
                })
            });
            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }

        async function triggerAiPipeline(customTranscriptContext) {
            try {
                let transcript = clientHistory.map(msg => `${msg.sender}: ${msg.text}`).join('\n');
                if (customTranscriptContext) {
                    transcript += `\nSystem Event Note: ${customTranscriptContext}`;
                }
                
                const geminiReply = await fetchGemini(transcript);
                clientHistory.push({ sender: 'Gemini', text: geminiReply });
                setTimeout(() => appendMessage('Gemini', formatLinksAndText(geminiReply)), 300);

                transcript += `\nGemini: ${geminiReply}`;

                const llamaReply = await fetchLlama(transcript);
                clientHistory.push({ sender: 'Llama', text: llamaReply });
                setTimeout(() => appendMessage('Llama', formatLinksAndText(llamaReply)), 1400);

            } catch (err) {
                console.error(err);
                appendMessage('User', "⚠️ Connection Error. Please verify your Gemini API key is active.");
            }
        }

        async function processChatText() {
            const message = userInput.value.trim();
            if (!message) return;

            appendMessage('User', formatLinksAndText(message));
            clientHistory.push({ sender: 'User', text: message });
            userInput.value = '';

            await triggerAiPipeline();
        }

        sendBtn.addEventListener('click', processChatText);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') processChatText(); });
    </script>
</body>
</html>
